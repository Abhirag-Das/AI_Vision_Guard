<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VisionGuard • Video</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Enhanced upload area with better visual feedback */
    .upload-area {
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      border: 3px dashed var(--purple);
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.05), transparent);
    }
    
    .upload-area:hover, .upload-area.drag-over {
      border-color: var(--teal);
      background: linear-gradient(135deg, rgba(20, 184, 166, 0.1), transparent);
      transform: scale(1.02);
    }
    
    .upload-area::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    
    .upload-area.drag-over::before {
      left: 100%;
    }
    
    /* Enhanced preview container */
    .preview-container {
      position: relative;
      margin: 20px 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }
    
    .preview-container:hover {
      transform: scale(1.02);
    }
    
    .preview-vid {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 16px;
      max-height: 400px;
      object-fit: contain;
    }
    
    /* Enhanced button states */
    .btn {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    
    .btn:hover::before {
      left: 100%;
    }
    
    /* Enhanced result display */
    .result-container {
      background: linear-gradient(135deg, var(--card-bg), #252547);
      border-radius: 20px;
      padding: 30px;
      margin: 30px 0;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }
    
    .result-badge {
      font-size: 4rem;
      font-weight: 800;
      margin: 20px 0;
      text-align: center;
      background: linear-gradient(90deg, var(--green), var(--teal));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
    }
    
    .result-badge.ai {
      background: linear-gradient(90deg, var(--red), #f87171);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
    }
    
    /* Enhanced action buttons */
    .action-buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    /* Loading animation */
    .loading-spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Progress indicator */
    .progress-container {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      margin: 20px 0;
    }
    
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--teal));
      width: 0%;
      transition: width 0.4s ease;
    }
    
    /* Enhanced file info */
    .file-info {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 10px;
      margin: 15px 0;
      font-size: 0.9rem;
    }
    
    /* Video thumbnail placeholder */
    .video-thumbnail {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      background: linear-gradient(135deg, #1a1a2e, #252547);
      border-radius: 12px;
      margin: 20px 0;
    }
    
    .video-icon {
      font-size: 4rem;
      color: var(--purple);
    }
    
    /* Improved responsive design */
    @media (max-width: 768px) {
      .action-buttons {
        flex-direction: column;
      }
      
      .btn {
        width: 100%;
      }
      
      .result-badge {
        font-size: 3rem;
      }
    }
    
    /* Micro-interactions */
    .pulse-animation {
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
    
    /* Enhanced back button */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      padding: 10px 15px;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    
    .btn-back:hover {
      background: rgba(255,255,255,0.1);
      transform: translateX(-3px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button onclick="window.location='/'" class="btn-back">
        <i class="fas fa-arrow-left"></i> Back
      </button>
      <div class="logo">VisionGuard</div>
    </div>

    <h2 class="text-center mb-6"><i class="fas fa-video mr-2"></i> Upload a Video</h2>
    
    <div id="upload-area" class="upload-area">
      <div class="text-center p-8">
        <i class="fas fa-cloud-upload-alt text-4xl mb-4 text-purple-400"></i>
        <p class="mb-4">Drag & drop your video file here</p>
        <p class="text-sm text-gray-400 mb-4">Supports MP4, MOV, AVI up to 50MB</p>
        <input type="file" id="file-input" accept="video/*" class="hidden" />
        <button onclick="document.getElementById('file-input').click()" class="btn btn-primary">
          <i class="fas fa-folder-open mr-2"></i>Choose Video
        </button>
      </div>
    </div>

    <div id="file-info" class="file-info hidden"></div>
    
    <div id="preview-container" class="preview-container hidden">
      <video id="preview-vid" class="preview-vid" controls></video>
    </div>
    
    <div id="video-thumbnail" class="video-thumbnail hidden">
      <i class="fas fa-video video-icon"></i>
    </div>

    <div id="progress-container" class="progress-container hidden">
      <div id="progress-bar" class="progress-bar"></div>
    </div>

    <button id="analyze-btn" class="btn btn-primary w-full hidden">
      <span id="analyze-text">🔍 Analyze Video</span>
      <span id="analyze-spinner" class="loading-spinner hidden"></span>
    </button>

    <div id="result" class="result-container hidden text-center">
      <div class="result-icon mb-4">
        <i id="result-icon" class="fas fa-check-circle text-5xl text-green-400"></i>
      </div>
      <div id="result-badge" class="result-badge"></div>
      <p id="result-description" class="text-gray-300 mb-6"></p>
      <div class="action-buttons">
        <button id="explain-btn" class="btn btn-primary hidden">
          <i class="fas fa-volume-up mr-2"></i>Explain
        </button>
        <button id="share-btn" class="btn btn-teal hidden">
          <i class="fas fa-share-alt mr-2"></i>Share Card
        </button>
      </div>
    </div>

    <audio id="tts-player" class="hidden"></audio>
    <canvas id="share-canvas" width="400" height="400" class="hidden"></canvas>
  </div>

  <script>
    window.pageType = 'video';
  </script>
  <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/04f46c6a/qrcode.min.js"></script>
  <script src="/static/script.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let currentResult = "";
      let currentAnalyzedImageUrl = "";
      let currentFile = null;

      const fileInput = document.getElementById('file-input');
      const uploadArea = document.getElementById('upload-area');
      const analyzeBtn = document.getElementById('analyze-btn');
      const previewContainer = document.getElementById('preview-container');
      const previewVid = document.getElementById('preview-vid');
      const videoThumbnail = document.getElementById('video-thumbnail');
      const resultEl = document.getElementById('result');
      const fileInfo = document.getElementById('file-info');
      const progressContainer = document.getElementById('progress-container');
      const progressBar = document.getElementById('progress-bar');
      const analyzeText = document.getElementById('analyze-text');
      const analyzeSpinner = document.getElementById('analyze-spinner');
      const explainBtn = document.getElementById('explain-btn');
      const shareBtn = document.getElementById('share-btn');

      if (!fileInput || !uploadArea || !analyzeBtn) return;

      // File handling
      fileInput.addEventListener('change', handleFile);
      uploadArea.addEventListener('dragover', e => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
      });
      uploadArea.addEventListener('dragleave', e => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
      });
      uploadArea.addEventListener('drop', e => {
          e.preventDefault();
          uploadArea.classList.remove('drag-over');
          if (e.dataTransfer.files.length) handleFile({ target: { files: e.dataTransfer.files } });
      });

      function handleFile(e) {
          const file = e.target.files[0];
          if (!file) return;

          // Reset state
          currentResult = "";
          currentAnalyzedImageUrl = "";
          resultEl?.classList.add('hidden');
          if (explainBtn) explainBtn.classList.add('hidden');
          if (shareBtn) shareBtn.classList.add('hidden');
          if (progressContainer) progressContainer.classList.add('hidden');

          // Show file info
          fileInfo.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
          fileInfo.classList.remove('hidden');

          // Create video thumbnail or preview
          const url = URL.createObjectURL(file);
          
          // Check if it's a video file to show preview
          const videoTypes = ['video/mp4', 'video/mov', 'video/avi', 'video/webm'];
          if (videoTypes.includes(file.type)) {
            previewVid.src = url;
            previewContainer.classList.remove('hidden');
            videoThumbnail.classList.add('hidden');
          } else {
            previewContainer.classList.add('hidden');
            videoThumbnail.classList.remove('hidden');
          }
          
          analyzeBtn.classList.remove('hidden');
          currentFile = file;
      }

      // Analyze
      analyzeBtn.addEventListener('click', async () => {
          if (!currentFile) return;

          resultEl?.classList.add('hidden');
          if (explainBtn) explainBtn.classList.add('hidden');
          if (shareBtn) shareBtn.classList.add('hidden');
          if (progressContainer) progressContainer.classList.remove('hidden');
          analyzeBtn.disabled = true;
          analyzeText.textContent = 'Analyzing...';
          analyzeSpinner.classList.remove('hidden');

          // Simulate progress
          let progress = 0;
          const interval = setInterval(() => {
              progress += Math.random() * 10;
              if (progress >= 100) {
                  progress = 100;
                  clearInterval(interval);
              }
              if (progressBar) progressBar.style.width = `${progress}%`;
          }, 300);

          const formData = new FormData();
          formData.append('file', currentFile);

          const isImagePage = window.location.pathname.includes('/image');
          const endpoint = isImagePage ? '/api/upload-image' : '/api/upload-video';

          try {
              const res = await fetch(endpoint, { method: 'POST', body: formData });
              const data = await res.json();

              clearInterval(interval);
              if (progressBar) progressBar.style.width = '100%';
              
              currentResult = data.result;
              currentAnalyzedImageUrl = "/" + data.analyzed_image;

              // Update result
              const resultBadge = document.getElementById('result-badge');
              const resultIcon = document.getElementById('result-icon');
              const resultDescription = document.getElementById('result-description');
              
              resultBadge.textContent = currentResult;
              resultBadge.className = currentResult === "AI" ? "result-badge ai" : "result-badge";
              
              if (currentResult === "AI") {
                resultIcon.className = "fas fa-exclamation-triangle text-5xl text-red-400";
                resultDescription.textContent = "This video shows signs of AI generation or manipulation. Our advanced algorithms detected synthetic patterns.";
              } else {
                resultIcon.className = "fas fa-check-circle text-5xl text-green-400";
                resultDescription.textContent = "This video appears to be authentic. No signs of AI generation or manipulation were detected.";
              }
              
              resultEl.classList.remove('hidden');
              if (explainBtn) explainBtn.classList.remove('hidden');
              if (shareBtn) shareBtn.classList.remove('hidden');
              if (progressContainer) progressContainer.classList.add('hidden');
          } catch (err) {
              alert("Analysis failed");
          } finally {
              analyzeBtn.disabled = false;
              analyzeText.textContent = '🔍 Analyze Video';
              analyzeSpinner.classList.add('hidden');
          }
      });

      // TTS
      document.getElementById('explain-btn')?.addEventListener('click', async () => {
          if (!currentResult || currentResult === "") {
              alert("Please analyze a file first.");
              return;
          }
          const res = await fetch(`/api/tts?label=${encodeURIComponent(currentResult)}`);
          const blob = await res.blob();
          document.getElementById('tts-player').src = URL.createObjectURL(blob);
          document.getElementById('tts-player').play();
      });

      // Share Card
      document.getElementById('share-btn')?.addEventListener('click', () => {
          if (!currentAnalyzedImageUrl || currentAnalyzedImageUrl === "") {
              alert("No analyzed image available.");
              return;
          }

          const canvas = document.getElementById('share-canvas');
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = 'white';
          ctx.fillRect(0, 0, 400, 400);

          const img = new Image();
          img.crossOrigin = "anonymous";
          img.onload = () => {
              const temp = document.createElement('canvas');
              const tctx = temp.getContext('2d');
              temp.width = img.width;
              temp.height = img.height;
              tctx.drawImage(img, 0, 0);
              ctx.filter = 'blur(12px)';
              ctx.drawImage(temp, 0, 0, 400, 400);
              ctx.filter = 'none';

              ctx.font = 'bold 72px "Inter", sans-serif';
              ctx.fillStyle = currentResult === "AI" ? 'rgba(239, 68, 68, 0.85)' : 'rgba(16, 185, 129, 0.85)';
              ctx.textAlign = 'center';
              ctx.fillText(currentResult, 200, 190);

              const qrCanvas = document.createElement('canvas');
              new QRCode(qrCanvas, { text: "http://localhost:8000", width: 60, height: 60 });
              ctx.drawImage(qrCanvas, 330, 330, 60, 60);

              const link = document.createElement('a');
              link.download = `VisionGuard_${currentResult}.jpg`;
              link.href = canvas.toDataURL('image/jpeg', 0.95);
              link.click();
          };
          img.src = currentAnalyzedImageUrl;
      });
    });
  </script>
</body>
</html>
